# ============================================================
# Logstash pipeline — accept JSON log events over TCP :5000
# from Spring services (via logstash-logback-encoder), write
# one index per service per day in Elasticsearch.
# ============================================================
input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  date {
    match => ["@timestamp", "ISO8601"]
  }
  if [level] == "TRACE" {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "aml-logs-%{[service_name]}-%{+YYYY.MM.dd}"
  }
}
