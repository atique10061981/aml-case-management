# ================================================================
# AML Case Management — Local Infrastructure (Codespaces-tuned)
# ================================================================
# Profiles:
#   (default) core     — Postgres, Redis, Kafka, Schema Registry,
#                        Kafka UI, MailHog  (~2.2 GB)
#   mongo              — MongoDB (~0.5 GB)
#   obs                — Prometheus, Grafana, Jaeger (~0.8 GB)
#   elk                — Elasticsearch, Logstash, Kibana (~2.5 GB)
#   qa                 — SonarQube + its Postgres (~2.5 GB)
#
# Use the Makefile (`make up`, `make obs`, `make elk`, `make qa`)
# rather than long `docker compose --profile ...` invocations.
# ================================================================

name: aml-cm

networks:
  aml-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  kafka-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
  sonarqube-pg-data:

services:

  # ============================================================
  # CORE — default profile (no `profiles:` attribute)
  # ============================================================

  postgres:
    image: postgres:17-alpine
    container_name: aml-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aml_admin
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Auto-runs once when the data volume is empty.
      # To re-trigger: `make clean` (wipes volumes), then `make up`.
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d aml_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7.4-alpine
    container_name: aml-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 256M

  # KRaft single-node Kafka. The dual-listener trick (PLAINTEXT for
  # in-cluster talkers, PLAINTEXT_HOST for the Codespace shell) is
  # what makes both "service in IntelliJ" and "service in Docker"
  # connect cleanly.
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: aml-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT_HOST}:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Single-broker dev: replication MUST be 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      # Tighter heap than the local-path version — fits 8 GB.
      KAFKA_HEAP_OPTS: '-Xms384m -Xmx512m'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 768M

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: aml-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      # Reduce heap from 1G default to 256M
      SCHEMA_REGISTRY_HEAP_OPTS: '-Xms192m -Xmx256m'
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 384M

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: aml-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aml-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: 'http://schema-registry:8081'
      DYNAMIC_CONFIG_ENABLED: 'true'
      JAVA_OPTS: '-Xms128m -Xmx192m'
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 256M

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: aml-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 96M

  # ============================================================
  # MONGO — opt-in (profile: mongo)
  # Only needed from Step 16 (Audit Service) onwards.
  # ============================================================
  mongodb:
    image: mongo:8.0
    container_name: aml-mongodb
    restart: unless-stopped
    profiles: [mongo]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: aml_audit
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo-data:/data/db
    # WiredTiger cache cap — Mongo's default is 50% of RAM, way too much
    command: ["--wiredTigerCacheSizeGB", "0.25"]
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet --host localhost
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # OBSERVABILITY (LIGHTWEIGHT) — profile: obs
  # Prometheus + Grafana + Jaeger only. ELK is its own profile.
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: aml-prometheus
    restart: unless-stopped
    profiles: [obs]
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.3.0
    container_name: aml-grafana
    restart: unless-stopped
    profiles: [obs]
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 256M

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: aml-jaeger
    restart: unless-stopped
    profiles: [obs]
    ports:
      - "${JAEGER_UI_PORT}:16686"
      - "${JAEGER_OTLP_GRPC_PORT}:4317"
      - "${JAEGER_OTLP_HTTP_PORT}:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
      SPAN_STORAGE_TYPE: memory
      # Cap in-memory trace storage so it doesn't grow forever
      MEMORY_MAX_TRACES: '5000'
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 320M

  # ============================================================
  # ELK STACK — profile: elk
  # Heavy (~2.5 GB). Start only when actively debugging logs.
  # ============================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: aml-elasticsearch
    restart: unless-stopped
    profiles: [elk]
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 1024M

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: aml-logstash
    restart: unless-stopped
    profiles: [elk]
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "${LOGSTASH_TCP_PORT}:5000/tcp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: '-Xms256m -Xmx384m'
    volumes:
      - ./infra/elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./infra/elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 512M

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: aml-kibana
    restart: unless-stopped
    profiles: [elk]
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "${KIBANA_PORT}:5601"
    environment:
      ELASTICSEARCH_HOSTS: 'http://elasticsearch:9200'
      NODE_OPTIONS: '--max-old-space-size=384'
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # QUALITY — profile: qa
  # ============================================================

  sonarqube-db:
    image: postgres:15-alpine
    container_name: aml-sonarqube-db
    restart: unless-stopped
    profiles: [qa]
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONARQUBE_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 256M

  sonarqube:
    image: sonarqube:10.7-community
    container_name: aml-sonarqube
    restart: unless-stopped
    profiles: [qa]
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "${SONARQUBE_PORT}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      SONAR_WEB_JAVAOPTS: '-Xmx512m -Xms128m'
      SONAR_CE_JAVAOPTS: '-Xmx512m -Xms128m'
      SONAR_SEARCH_JAVAOPTS: '-Xmx512m -Xms512m'
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks: [aml-net]
    deploy:
      resources:
        limits:
          memory: 2048M
